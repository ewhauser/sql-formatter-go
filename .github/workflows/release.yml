name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: false

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BIN_NAME="sql-formatter"
          if [ "${GOOS}" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          mkdir -p dist
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "dist/${BIN_NAME}" ./cmd/sql-formatter
          TAR_NAME="sql-formatter_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          tar -C dist -czf "dist/${TAR_NAME}" "${BIN_NAME}"
          rm "dist/${BIN_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./*.tar.gz > checksums.txt

      - name: Release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ASSETS=(./dist/*.tar.gz ./dist/checksums.txt)
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" "${ASSETS[@]}" --clobber
          else
            gh release create "${VERSION}" "${ASSETS[@]}" --generate-notes --target "${GITHUB_SHA}"
          fi
